[arxiv]
# arXiv archive codes, ordered by display priority (space-separated)
# full list: arxiv.org/help/subscribe#archive-list
subjects = math.na stat.ml cs.lg

# date range for retrieving submissions (UTC)
#   n             papers from n days ago (if n=1 on Monday, fetches Friday's)
#   n-m           papers from n to m days ago
#   since-last-check   papers since the last successful run
date_range = 3

# maximum results per API query (500 is sufficient for ~20 archives daily)
max_results = 500

# keywords to highlight in titles and authors (comma-separated)
keywords = sample_keyword, sample_author

[display]
font_face = helvetica
font_size = 10pt
# print paper details to console (true/false)
show_in_console = false

[email]
# set enabled = true to send the report via email after each run
enabled = false
smtp_host = smtp.gmail.com
smtp_port = 587
from =
to =
